<!DOCTYPE html>

<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Studio</title>

<style>
html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #050507;
  color: white;
  overflow-x: hidden;
}

/* 🔥 ANIMATED BACKGROUND */
.bg {
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 30% 30%, #ff00aa22, transparent),
              radial-gradient(circle at 70% 60%, #00f0ff22, transparent);
  animation: moveBg 20s linear infinite;
  z-index: -2;
}

@keyframes moveBg {
  0% { transform: translate(0,0); }
  50% { transform: translate(-10%, -10%); }
  100% { transform: translate(0,0); }
}

/* 🌌 PARTICLES */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* NAV */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(20px);
}

nav div {
  display: flex;
  gap: 40px;
}

nav a {
  color: #aaa;
  text-decoration: none;
}

nav a:hover { color: white; }

/* HERO */
section {
  min-height: 100vh;
  padding: 120px 20px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* 💥 GLITCH TEXT */
.hero-title {
  font-size: 80px;
  font-weight: 700;
  position: relative;
}

.hero-title::before,
.hero-title::after {
  content: attr(data-text);
  position: absolute;
  left: 0;
}

.hero-title::before {
  color: #ff00aa;
  animation: glitch 2s infinite;
}

.hero-title::after {
  color: #00f0ff;
  animation: glitch 2s infinite reverse;
}

@keyframes glitch {
  0% { transform: translate(0); }
  20% { transform: translate(-2px,2px); }
  40% { transform: translate(-2px,-2px); }
  60% { transform: translate(2px,2px); }
  80% { transform: translate(2px,-2px); }
  100% { transform: translate(0); }
}

/* 🧲 MAGNET BUTTON */
.btn {
  margin-top: 40px;
  padding: 14px 32px;
  border-radius: 30px;
  background: white;
  color: black;
  border: none;
  cursor: pointer;
  transition: transform 0.2s;
}

/* PROJECTS */
.projects {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap: 20px;
}

.card {
  padding: 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05) rotateX(5deg);
  box-shadow: 0 0 40px #ff00aa55;
}
</style>

</head>

<body>

<div class="bg"></div>
<canvas id="particles"></canvas>

<nav>
  <div>
    <a href="#home">Home</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact Me</a>
  </div>
</nav>

<section id="home">
  <div class="hero-title" data-text="NEON FUTURE">
    NEON FUTURE
  </div>
  <p>Experiență digitală de nouă generație</p>
  <button class="btn">Explore</button>
</section>

<section id="projects">
  <h2>Proiecte</h2>
  <div class="projects">
    <div class="card">AI Interface</div>
    <div class="card">3D Web Experience</div>
    <div class="card">Interactive Portfolio</div>
  </div>
</section>

<section id="contact">
  <h2>Contact Me</h2>
</section>

<script>
/* 🌌 PARTICLES */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let particles = [];

for(let i=0;i<80;i++){
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2,
    dx: (Math.random()-0.5)*0.5,
    dy: (Math.random()-0.5)*0.5
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    p.x+=p.dx;
    p.y+=p.dy;

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();
  });
  requestAnimationFrame(draw);
}
draw();

/* 🧲 MAGNET EFFECT */
const btn = document.querySelector(".btn");

btn.addEventListener("mousemove", e=>{
  const rect = btn.getBoundingClientRect();
  const x = e.clientX - rect.left - rect.width/2;
  const y = e.clientY - rect.top - rect.height/2;

  btn.style.transform = `translate(${x*0.2}px, ${y*0.2}px)`;
});

btn.addEventListener("mouseleave", ()=>{
  btn.style.transform = "translate(0,0)";
});
</script>

</body>
</html>
