<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Studio</title>

<style>
html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #050505;
  color: white;
  overflow-x: hidden;
}

/* 3D BACKGROUND */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -2;
}

/* CURSOR GLOW */
.cursor {
  position: fixed;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle,#ff00aa55,transparent);
  filter: blur(80px);
  pointer-events: none;
  transform: translate(-50%,-50%);
  z-index: 1;
}

/* NAV */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  padding: 20px 60px;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
  z-index: 10;
}

nav a {
  margin-left: 25px;
  text-decoration: none;
  color: #aaa;
  transition: 0.3s;
}

nav a:hover {
  color: #ff00aa;
}

/* SECTIONS */
section {
  min-height: 100vh;
  padding: 120px 80px;
  opacity: 0;
  transform: translateY(50px);
  transition: all 1s ease;
}

section.show {
  opacity: 1;
  transform: translateY(0);
}

/* HERO */
.title {
  font-size: 75px;
  background: linear-gradient(90deg,#ff00aa,#ff66cc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* PROJECTS */
.projects {
  display: flex;
  gap: 25px;
  flex-wrap: wrap;
  margin-top: 40px;
}

.card {
  width: 260px;
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  transition: transform 0.2s ease;
  position: relative;
}

/* CONTACT */
input, textarea {
  display: block;
  margin-top: 12px;
  padding: 14px;
  width: 320px;
  border-radius: 12px;
  border: none;
  background: rgba(255,255,255,0.05);
  color: white;
}

button {
  margin-top: 20px;
  padding: 14px 30px;
  border-radius: 30px;
  border: 1px solid #ff00aa;
  background: transparent;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #ff00aa;
  box-shadow: 0 0 25px #ff00aa;
}
</style>
</head>

<body>

<nav>
  <div>DEV<span style="color:#ff00aa;">X</span></div>
  <div>
    <a href="#home">Home</a>
    <a href="#projects">Proiecte</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<canvas id="bg"></canvas>
<div class="cursor"></div>

<!-- HOME -->
<section id="home">
  <div class="title">Neon Studio</div>
  <p>Experiențe digitale de nouă generație</p>
</section>

<!-- PROJECTS -->
<section id="projects">
  <h2>Proiecte</h2>

  <div class="projects">
    <div class="card">🚀 Website futuristic</div>
    <div class="card">💎 UI premium</div>
    <div class="card">⚡ App rapid</div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact</h2>

  <input placeholder="Nume">
  <input placeholder="Email">
  <textarea placeholder="Mesaj"></textarea>
  <button>Trimite</button>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>
/* ===== 3D BACKGROUND ===== */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({alpha:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const geometry = new THREE.BufferGeometry();
const count = 2000;
const positions = new Float32Array(count * 3);

for(let i=0;i<count*3;i++){
  positions[i] = (Math.random()-0.5)*25;
}

geometry.setAttribute('position', new THREE.BufferAttribute(positions,3));

const material = new THREE.PointsMaterial({
  color: 0xff00aa,
  size: 0.03
});

const particles = new THREE.Points(geometry, material);
scene.add(particles);

camera.position.z = 6;

function animate(){
  requestAnimationFrame(animate);
  particles.rotation.y += 0.001;
  renderer.render(scene,camera);
}
animate();

/* ===== CURSOR ===== */
document.addEventListener("mousemove", e=>{
  const c = document.querySelector(".cursor");
  c.style.left = e.clientX + "px";
  c.style.top = e.clientY + "px";
});

/* ===== SCROLL REVEAL ===== */
const sections = document.querySelectorAll("section");

window.addEventListener("scroll", ()=>{
  sections.forEach(sec=>{
    const top = sec.getBoundingClientRect().top;
    if(top < window.innerHeight - 100){
      sec.classList.add("show");
    }
  });
});

/* ===== 3D CARD HOVER ===== */
document.querySelectorAll(".card").forEach(card=>{
  card.addEventListener("mousemove",(e)=>{
    const r = card.getBoundingClientRect();
    const x = e.clientX - r.left;
    const y = e.clientY - r.top;

    const rotX = ((y / r.height) - 0.5) * -20;
    const rotY = ((x / r.width) - 0.5) * 20;

    card.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
  });

  card.addEventListener("mouseleave",()=>{
    card.style.transform = "rotateX(0deg) rotateY(0deg)";
  });
});

/* RESIZE */
window.addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
