<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon 3D Experience</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #050505;
  color: white;
  font-family: Arial, sans-serif;
}

/* TEXT UI */
.hero {
  position: absolute;
  top: 50%;
  left: 80px;
  transform: translateY(-50%);
  z-index: 2;
}

.title {
  font-size: 70px;
  background: linear-gradient(90deg,#ff00aa,#ff66cc,#ff00aa);
  background-size: 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: move 4s linear infinite;
}

@keyframes move {
  0% {background-position:0%;}
  100% {background-position:200%;}
}

.subtitle {
  margin-top: 15px;
  color: #aaa;
}

.btn {
  margin-top: 25px;
  padding: 15px 40px;
  border-radius: 40px;
  border: 1px solid #ff00aa;
  background: transparent;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  background: #ff00aa;
  box-shadow: 0 0 30px #ff00aa;
}

/* CURSOR GLOW */
.cursor {
  position: fixed;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle,#ff00aa55,transparent);
  pointer-events: none;
  filter: blur(80px);
  transform: translate(-50%,-50%);
  z-index:1;
}
</style>
</head>

<body>

<div class="hero">
  <div class="title">NEON FUTURE</div>
  <div class="subtitle">Experiență digitală premium</div>
  <button class="btn">Explorează</button>
</div>

<div class="cursor"></div>

<!-- THREE.JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>
/* SCENE */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({alpha:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

/* PARTICLE FIELD 3D */
const geometry = new THREE.BufferGeometry();
const count = 2000;

const positions = new Float32Array(count * 3);

for (let i = 0; i < count * 3; i++) {
  positions[i] = (Math.random() - 0.5) * 20;
}

geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

const material = new THREE.PointsMaterial({
  color: 0xff00aa,
  size: 0.03
});

const particles = new THREE.Points(geometry, material);
scene.add(particles);

camera.position.z = 5;

/* ANIMATION */
function animate() {
  requestAnimationFrame(animate);

  particles.rotation.y += 0.001;
  particles.rotation.x += 0.0005;

  renderer.render(scene, camera);
}
animate();

/* PARALLAX MOUSE */
document.addEventListener("mousemove", (e)=>{
  const x = (e.clientX / innerWidth - 0.5);
  const y = (e.clientY / innerHeight - 0.5);

  particles.rotation.y += x * 0.02;
  particles.rotation.x += y * 0.02;
});

/* CURSOR GLOW */
document.addEventListener("mousemove", e=>{
  const c = document.querySelector(".cursor");
  c.style.left = e.clientX + "px";
  c.style.top = e.clientY + "px";
});

/* RESIZE */
window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
